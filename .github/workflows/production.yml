name: Deploy Full Stack (BE then FE)

on:
  push:
    branches: [ "main" ]

jobs:
  # =========================
  # JOB 1: DEPLOY BACKEND
  # =========================
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Execute Backend Commands via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          HOST: ${{ secrets.HOSTINGER_HOST }}
          USER: ${{ secrets.HOSTINGER_USER }}
          PORT: ${{ secrets.HOSTINGER_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

           # Add host key to known_hosts
          ssh-keyscan -p $PORT $HOST >> ~/.ssh/known_hosts 2>/dev/null || true
          
          ssh -p $PORT -o StrictHostKeyChecking=no $USER@$HOST << EOF
            set -e

            echo "📁 Masuk ke folder backend"
            cd /home/${{ secrets.HOSTINGER_USER }}/domains/jissho.org/public_html/production

            echo "🔄 Reset & pull code"
            git reset --hard HEAD
            git pull origin main

            echo "📦 Install composer"
            composer install --optimize-autoloader --no-dev

            echo "🗄️ Migrasi database"
            php artisan migrate --force

            echo "⚡ Optimasi Laravel"
            php artisan config:clear
            php artisan config:cache
            php artisan route:cache

            echo "✅ Backend deployment selesai"
          EOF

  # --- JOB 2: DEPLOY FRONTEND ---
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend # Memastikan Frontend baru jalan setelah Backend BERHASIL
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install and Build
        run: |
          npm ci || npm install
          npm run build

      - name: Upload Frontend Assets via Rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          HOST: ${{ secrets.HOSTINGER_HOST }}
          USER: ${{ secrets.HOSTINGER_USER }}
          PORT: ${{ secrets.HOSTINGER_PORT }}
          # Pastikan folder target konsisten (staging vs production)
          TARGET: "/home/${{ secrets.HOSTINGER_USER }}/domains/jissho.org/public_html/production/public/build/"
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          rsync -avz --delete \
            -e "ssh -p $PORT -o StrictHostKeyChecking=no" \
            public/build/ $USER@$HOST:$TARGET
