version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jissho_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - app_network

  web:
    image: nginx:alpine
    container_name: jissho_nginx
    restart: unless-stopped
    ports:
      - "8090:80" # Akses web nanti lewat http://IP-ARMBIAN:8080
    volumes:
      - ./:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app_network
    depends_on:
      - app

networks:
  app_network:
    external: true